# Example edge nginx config for malevolentgods.com
#
# This assumes:
# - the old site still owns /
# - the new Astro site is mounted temporarily under /new/
# - the new site container is available on the shared Docker network as mg-website:80
# - other internal services may also be routed through the same edge proxy
#
# IMPORTANT:
# If the Astro site is mounted under /new/ in production, it should be built with:
#   base: '/new'
# in astro.config.mjs (or via an environment-specific config pattern).

server {
    listen 443 ssl;
    server_name malevolentgods.com;

    ssl_certificate /etc/letsencrypt/live/malevolentgods.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/malevolentgods.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/html;
    index index.html;

    # Legacy site at /
    location / {
        try_files $uri $uri/ /index.html;
    }

    location /clobber/ {
        autoindex on;
    }

    # Redirect bare /new to /new/
    location = /new {
        return 301 /new/;
    }

    # New Astro site mounted under /new/
    location /new/ {
        proxy_pass http://mg-website:80/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # Example future service mounts
    # location /services/ritual-indexer/ {
    #     proxy_pass http://ritual-indexer:8080/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    # location /dashboards/signal-loom/ {
    #     proxy_pass http://signal-loom:3000/;
    #     proxy_http_version 1.1;
    #     proxy_set_header Host $host;
    #     proxy_set_header X-Real-IP $remote_addr;
    #     proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    #     proxy_set_header X-Forwarded-Proto $scheme;
    # }

    limit_req zone=req_limit_per_ip burst=20 nodelay;
    limit_conn conn_limit_per_ip 20;
}

server {
    listen 80;
    server_name malevolentgods.com;
    return 301 https://$host$request_uri;
}
